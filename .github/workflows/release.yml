name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0

jobs:
  build-windows:
    name: Build Windows desktop app (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: windows/amd64
            artifact_suffix: windows-amd64
          - arch: "386"
            platform: windows/386
            artifact_suffix: windows-386
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          $gopath = go env GOPATH
          Join-Path $gopath "bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build application
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $ldflags = "-X main.appVersion=$version -X main.releaseChannel=${{ matrix.artifact_suffix }}"
          wails build -platform ${{ matrix.platform }} -clean -webview2 embed -ldflags $ldflags

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $suffix = "${{ matrix.artifact_suffix }}"
          $exeName = "ArchivoScivoliGNC-$version-$suffix.exe"
          Copy-Item build\bin\ArchivoScivoliGNC.exe "artifacts\$exeName"
          Copy-Item docs\manual-de-uso.html "artifacts\manual-de-uso.html"
          Compress-Archive -Path "artifacts\$exeName", "artifacts\manual-de-uso.html" -DestinationPath "artifacts\ArchivoScivoliGNC-$version-$suffix.zip"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: artifacts/*
          if-no-files-found: error

  build-windows-win7:
    name: Build Windows 7 desktop app (386)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Setup Go 1.20 toolchain
        shell: pwsh
        run: |
          go install golang.org/dl/go1.20.14@latest
          go1.20.14 download
          $gopath = go env GOPATH
          Join-Path $gopath "bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build Win7-compatible binary
        shell: pwsh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: .\scripts\build-win7-386.ps1

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-386-win7
          path: artifacts/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs: [build-windows, build-windows-win7]
    if: ${{ !cancelled() && needs.build-windows.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
