name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0

jobs:
  build-windows:
    name: Build Windows desktop app
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}
          $gopath = go env GOPATH
          Join-Path $gopath "bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build application
        shell: pwsh
        run: wails build -platform windows/amd64 -clean

      - name: Package artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item build\bin\ArchivoScivoliGNC.exe artifacts\
          $version = "${{ github.ref_name }}" -replace '^v', ''
          Compress-Archive -Path artifacts\ArchivoScivoliGNC.exe -DestinationPath "artifacts\ArchivoScivoliGNC-$version-windows-amd64.zip"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ArchivoScivoliGNC.exe
            artifacts/ArchivoScivoliGNC-*-windows-amd64.zip
          generate_release_notes: true
